[package]
name = "oracle_aggregator"
version = "0.1.0"
edition = "2021"

[dependencies]
soroban-sdk = { workspace = true }

[dev-dependencies]
ed25519-dalek = "2.1"
rand = "0.8"
arbitrary = { version = "1.3", features = ["derive"] }

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "oracle_aggregator"
path = "src/lib.rs"

[profile.release]
overflow-checks = true
