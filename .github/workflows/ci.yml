name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install --timeout 300 -r requirements.txt ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest --cov=detection --cov=ingestion --cov=config -q

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scoring pipeline benchmarks
        run: make benchmark-check

  fuzz:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: rustfmt, clippy
      
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      
      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: |
            contracts/oracle_aggregator/fuzz/corpus
            contracts/zk_verifier/fuzz/corpus
          key: fuzz-corpus-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-
      
      - name: Fuzz oracle_aggregator (short PR run)
        run: |
          cd contracts/oracle_aggregator
          for target in fuzz_submit_with_quorum fuzz_canonical_message fuzz_auth_bypass; do
            echo "Running $target for 120 seconds..."
            cargo +nightly fuzz run $target -- -max_total_time=120 -max_len=1024 || exit 1
          done
      
      - name: Fuzz zk_verifier (short PR run)
        run: |
          cd contracts/zk_verifier
          for target in fuzz_submit_score fuzz_verify_threshold fuzz_auth_bypass; do
            echo "Running $target for 120 seconds..."
            cargo +nightly fuzz run $target -- -max_total_time=120 -max_len=1024 || exit 1
          done
      
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-artifacts
          path: |
            contracts/oracle_aggregator/fuzz/artifacts
            contracts/zk_verifier/fuzz/artifacts
          retention-days: 30
