groups:
  - name: ledgerlens
    rules:
      - alert: SorobanCircuitBreakerOpen
        expr: increase(ledgerlens_circuit_breaker_open_total[5m]) > 0
        for: 0m
        annotations:
          summary: "Soroban circuit breaker opened"
          description: "The Soroban circuit breaker has opened due to consecutive submission failures. Check RPC connectivity and service key configuration."
          runbook: "Inspect logs for SorobanCircuitOpenError. Verify SOROBAN_RPC_URL, LEDGERLENS_SERVICE_SECRET_KEY, and contract authorization. Circuit auto-resets after SOROBAN_CIRCUIT_RESET_SECONDS (default 300s)."

      - alert: WebhookDeadLetterBacklog
        expr: increase(ledgerlens_webhook_deliveries_total{result="dead_lettered"}[1h]) > 10
        for: 0m
        annotations:
          summary: "Webhook dead-letter backlog exceeds threshold"
          description: "More than 10 webhook deliveries have permanently failed in the last hour."
          runbook: "Inspect GET /webhooks/dead-letters. Check subscriber URLs are reachable over HTTPS. Verify LEDGERLENS_WEBHOOK_ENCRYPTION_KEY is set. Dead letters require manual intervention or subscriber re-registration."

      - alert: FeatureDriftDetected
        expr: increase(ledgerlens_drift_detected_total[24h]) > 0
        for: 0m
        annotations:
          summary: "Feature distribution drift detected"
          description: "At least one feature-drift event was recorded in the last 24 hours."
          runbook: "Run `python cli.py retrain-check` to review the drift report. Check /admin/drift-reports for PSI values. If PSI > 0.25 on key Benford features, consider running `cli.py retrain-check --force-retrain`."

      - alert: ScoringLatencyHigh
        expr: histogram_quantile(0.95, rate(ledgerlens_scoring_latency_seconds_bucket[10m])) > 2.0
        for: 5m
        annotations:
          summary: "p95 scoring latency exceeds 2 seconds"
          description: "The 95th-percentile wallet scoring latency is above 2.0s over the last 10 minutes."
          runbook: "Check Horizon API latency (HORIZON_URL), model inference load, and DB write throughput. Consider reducing TRADE_HISTORY_LOOKBACK_DAYS or scaling the pipeline. Acts as a backstop symptom alert alongside SLO burn-rate alerts."

      - alert: PipelineStalled
        expr: (time() - ledgerlens_pipeline_run_duration_seconds_created) > 300
        for: 0m
        annotations:
          summary: "Pipeline has not run in over 5 minutes"
          description: "The detection pipeline last completed more than 300 seconds ago."
          runbook: "Check that `python run_pipeline.py` or `cli.py score` is running and not stuck. Review logs for exceptions in horizon ingestion or model loading. Verify LEDGERLENS_DB_PATH is writable."

      # =========================================================================
      # SLO Multi-Window Multi-Burn-Rate Alert Rules
      # =========================================================================

      # --- Scoring Latency SLO (Target: 99.0% < 2s) ---
      - alert: ScoringLatencySLOFastBurn
        expr: |
          (
            1 - (
              sum(rate(ledgerlens_scoring_latency_seconds_bucket{le="2.0"}[1h]))
              / sum(rate(ledgerlens_scoring_latency_seconds_count[1h]))
            )
          ) > (14.4 * 0.01)
          and
          (
            1 - (
              sum(rate(ledgerlens_scoring_latency_seconds_bucket{le="2.0"}[5m]))
              / sum(rate(ledgerlens_scoring_latency_seconds_count[5m]))
            )
          ) > (14.4 * 0.01)
        for: 2m
        labels:
          severity: page
          slo: scoring_latency
        annotations:
          summary: "Scoring latency SLO fast-burn: consuming 30-day error budget in < 2 days at current rate"
          runbook: "Same triage as ScoringLatencyHigh: check Horizon latency, model inference load, SQLite write throughput."

      - alert: ScoringLatencySLOSlowBurn
        expr: |
          (
            1 - (
              sum(rate(ledgerlens_scoring_latency_seconds_bucket{le="2.0"}[6h]))
              / sum(rate(ledgerlens_scoring_latency_seconds_count[6h]))
            )
          ) > (6.0 * 0.01)
          and
          (
            1 - (
              sum(rate(ledgerlens_scoring_latency_seconds_bucket{le="2.0"}[30m]))
              / sum(rate(ledgerlens_scoring_latency_seconds_count[30m]))
            )
          ) > (6.0 * 0.01)
        for: 15m
        labels:
          severity: ticket
          slo: scoring_latency
        annotations:
          summary: "Scoring latency SLO slow-burn: consuming 30-day error budget in < 5 days at current rate"
          runbook: "Analyze latency trends via Grafana dashboard. Check model inference resources and DB indices."

      # --- Webhook Delivery SLO (Target: 99.0% success) ---
      - alert: WebhookDeliverySLOFastBurn
        expr: |
          (
            1 - (
              sum(rate(ledgerlens_webhook_deliveries_total{result="delivered"}[1h]))
              / sum(rate(ledgerlens_webhook_deliveries_total[1h]))
            )
          ) > (14.4 * 0.01)
          and
          (
            1 - (
              sum(rate(ledgerlens_webhook_deliveries_total{result="delivered"}[5m]))
              / sum(rate(ledgerlens_webhook_deliveries_total[5m]))
            )
          ) > (14.4 * 0.01)
        for: 2m
        labels:
          severity: page
          slo: webhook_delivery
        annotations:
          summary: "Webhook delivery SLO fast-burn: consuming 30-day error budget in < 2 days"
          runbook: "Check webhook consumer dead letters and destination URL connectivity/latency."

      - alert: WebhookDeliverySLOSlowBurn
        expr: |
          (
            1 - (
              sum(rate(ledgerlens_webhook_deliveries_total{result="delivered"}[6h]))
              / sum(rate(ledgerlens_webhook_deliveries_total[6h]))
            )
          ) > (6.0 * 0.01)
          and
          (
            1 - (
              sum(rate(ledgerlens_webhook_deliveries_total{result="delivered"}[30m]))
              / sum(rate(ledgerlens_webhook_deliveries_total[30m]))
            )
          ) > (6.0 * 0.01)
        for: 15m
        labels:
          severity: ticket
          slo: webhook_delivery
        annotations:
          summary: "Webhook delivery SLO slow-burn: consuming 30-day error budget in < 5 days"
          runbook: "Investigate webhook worker queue backlog, retry delays, and failing subscriber domains."

      # --- Soroban Submission SLO (Target: 99.0% success, excluding dry runs) ---
      - alert: SorobanSubmissionSLOFastBurn
        expr: |
          (
            1 - (
              sum(rate(ledgerlens_soroban_submissions_total{status="success"}[1h]))
              / sum(rate(ledgerlens_soroban_submissions_total{status!="skipped"}[1h]))
            )
          ) > (14.4 * 0.01)
          and
          (
            1 - (
              sum(rate(ledgerlens_soroban_submissions_total{status="success"}[5m]))
              / sum(rate(ledgerlens_soroban_submissions_total{status!="skipped"}[5m]))
            )
          ) > (14.4 * 0.01)
        for: 2m
        labels:
          severity: page
          slo: soroban_submission
        annotations:
          summary: "Soroban submission SLO fast-burn: consuming 30-day error budget in < 2 days"
          runbook: "Check Horizon RPC connectivity, network congestion/gas prices, and contract authorization."

      - alert: SorobanSubmissionSLOSlowBurn
        expr: |
          (
            1 - (
              sum(rate(ledgerlens_soroban_submissions_total{status="success"}[6h]))
              / sum(rate(ledgerlens_soroban_submissions_total{status!="skipped"}[6h]))
            )
          ) > (6.0 * 0.01)
          and
          (
            1 - (
              sum(rate(ledgerlens_soroban_submissions_total{status="success"}[30m]))
              / sum(rate(ledgerlens_soroban_submissions_total{status!="skipped"}[30m]))
            )
          ) > (6.0 * 0.01)
        for: 15m
        labels:
          severity: ticket
          slo: soroban_submission
        annotations:
          summary: "Soroban submission SLO slow-burn: consuming 30-day error budget in < 5 days"
          runbook: "Analyze submission rate limits, RPC node latency, and key management service throughput."

      # --- Score Availability SLO (Target: 99.5% success for GET /scores/{wallet}) ---
      - alert: ScoreAvailabilitySLOFastBurn
        expr: |
          (
            1 - (
              sum(rate(ledgerlens_api_request_duration_seconds_count{method="GET",endpoint=~"/v1/scores/\\{wallet\\}|/scores/\\{wallet\\}",status_code!~"5.."}[1h]))
              / sum(rate(ledgerlens_api_request_duration_seconds_count{method="GET",endpoint=~"/v1/scores/\\{wallet\\}|/scores/\\{wallet\\}"}[1h]))
            )
          ) > (14.4 * 0.005)
          and
          (
            1 - (
              sum(rate(ledgerlens_api_request_duration_seconds_count{method="GET",endpoint=~"/v1/scores/\\{wallet\\}|/scores/\\{wallet\\}",status_code!~"5.."}[5m]))
              / sum(rate(ledgerlens_api_request_duration_seconds_count{method="GET",endpoint=~"/v1/scores/\\{wallet\\}|/scores/\\{wallet\\}"}[5m]))
            )
          ) > (14.4 * 0.005)
        for: 2m
        labels:
          severity: page
          slo: score_availability
        annotations:
          summary: "Score availability SLO fast-burn: consuming 30-day error budget in < 2 days"
          runbook: "Triage API server health. Verify FastAPI process limits, CPU/memory exhaustion, or SQLite DB locks."

      - alert: ScoreAvailabilitySLOSlowBurn
        expr: |
          (
            1 - (
              sum(rate(ledgerlens_api_request_duration_seconds_count{method="GET",endpoint=~"/v1/scores/\\{wallet\\}|/scores/\\{wallet\\}",status_code!~"5.."}[6h]))
              / sum(rate(ledgerlens_api_request_duration_seconds_count{method="GET",endpoint=~"/v1/scores/\\{wallet\\}|/scores/\\{wallet\\}"}[6h]))
            )
          ) > (6.0 * 0.005)
          and
          (
            1 - (
              sum(rate(ledgerlens_api_request_duration_seconds_count{method="GET",endpoint=~"/v1/scores/\\{wallet\\}|/scores/\\{wallet\\}",status_code!~"5.."}[30m]))
              / sum(rate(ledgerlens_api_request_duration_seconds_count{method="GET",endpoint=~"/v1/scores/\\{wallet\\}|/scores/\\{wallet\\}"}[30m]))
            )
          ) > (6.0 * 0.005)
        for: 15m
        labels:
          severity: ticket
          slo: score_availability
        annotations:
          summary: "Score availability SLO slow-burn: consuming 30-day error budget in < 5 days"
          runbook: "Inspect slow requests and intermittent errors on GET /scores/{wallet} endpoint. Verify database performance."
