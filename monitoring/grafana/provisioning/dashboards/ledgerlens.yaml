# Grafana dashboard provisioning configuration for LedgerLens
#
# This file enables Grafana's "dashboard-as-code" feature, automatically
# loading dashboards from the filesystem at startup rather than requiring
# manual import through the UI.
#
# Installation:
# 1. Copy this file to your Grafana server's provisioning directory:
#    /etc/grafana/provisioning/dashboards/ledgerlens.yaml
#
# 2. Copy the dashboard JSON files to the path specified below:
#    /var/lib/grafana/dashboards/ledgerlens/
#
# 3. Restart Grafana or wait for the provisioning interval (default 10s)
#
# See: https://grafana.com/docs/grafana/latest/administration/provisioning/#dashboards

apiVersion: 1

providers:
  - name: 'LedgerLens'
    orgId: 1
    folder: 'LedgerLens'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/ledgerlens
      foldersFromFilesStructure: false
