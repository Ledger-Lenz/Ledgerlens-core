apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ledgerlens-canary-analysis
  labels:
    {{- include "ledgerlens.labels" . | nindent 4 }}
spec:
  metrics:
    - name: p95-latency
      interval: 1m
      successCondition: result < {{ .Values.canary.analysis.p95LatencyThresholdSeconds }}
      provider:
        prometheus:
          address: {{ .Values.canary.prometheusUrl }}
          query: |
            histogram_quantile(0.95, rate(ledgerlens_api_request_duration_seconds_bucket{service="{{ include \"ledgerlens.fullname\" . }}"}[5m]))
    - name: error-rate
      interval: 1m
      successCondition: result < {{ .Values.canary.analysis.errorRateThreshold }}
      provider:
        prometheus:
          address: {{ .Values.canary.prometheusUrl }}
          query: |
            sum(rate(ledgerlens_api_request_duration_seconds_count{status_code=~"5.."}[5m])) / sum(rate(ledgerlens_api_request_duration_seconds_count[5m]))
    - name: circuit-breaker
      interval: 1m
      successCondition: result == 0
      provider:
        prometheus:
          address: {{ .Values.canary.prometheusUrl }}
          query: increase(ledgerlens_circuit_breaker_open_total[5m])
