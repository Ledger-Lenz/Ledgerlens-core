apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "ledgerlens.fullname" . }}-api
  labels:
    {{- include "ledgerlens.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    canary:
      steps:
        - setWeight: {{ .Values.canary.steps[0].setWeight }}
        - pause: {duration: {{ .Values.canary.steps[1].pauseSeconds }}s}
        - analysis:
            templates:
              - name: ledgerlens-canary-analysis
        - setWeight: {{ .Values.canary.steps[2].setWeight }}
        - pause: {duration: {{ .Values.canary.steps[3].pauseSeconds }}s}
        - analysis:
            templates:
              - name: ledgerlens-canary-analysis
        - setWeight: 100
  selector:
    matchLabels:
      {{- include "ledgerlens.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "ledgerlens.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "ledgerlens.serviceAccountName" . }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ledgerlens.fullname" . }}
            - secretRef:
                name: {{ include "ledgerlens.fullname" . }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ledgerlens.fullname" . }}
