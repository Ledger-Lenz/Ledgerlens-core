apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: ledgerlens-ingestion-pod-kill
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces: ["ledgerlens"]
    labelSelectors:
      "app.kubernetes.io/component": ingestion-worker
  scheduler:
    cron: "@every 10m"
  duration: "30s"
